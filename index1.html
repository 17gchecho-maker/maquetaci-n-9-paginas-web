    <script>
document.addEventListener("DOMContentLoaded", function () {

    // Seleccionamos todas las cajas
    const cajas = document.querySelectorAll(
        ".bloquePrincipal, .cuadroPequeno, .linea, .lineaCorta"
    );

    cajas.forEach(function (caja) {
        caja.addEventListener("click", function () {
            
            // Agrega o quita la clase zoom-activo
            caja.classList.toggle("zoom-activo");

        });
    });

});
</script>
